name: Sync fork (keep my changes)

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/router-for-me/CLIProxyAPI.git || true
          git fetch upstream

      - name: Merge upstream/main into main (keeps my commits)
        run: |
          git checkout main
          git pull origin main
          BEFORE_MERGE=$(git rev-parse HEAD)
          git merge --no-edit upstream/main
          # Restore our workflow files after merge: GITHUB_TOKEN cannot push
          # .github/workflows/ changes, so we keep our own versions.
          git checkout "${BEFORE_MERGE}" -- .github/workflows/
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

      - name: Push to fork
        run: |
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
            echo "Fork is already up to date with upstream. Nothing to push."
          else
            git push origin main
          fi
